<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" role="img" aria-label="DJ Szambiarz">
  <defs>
    <linearGradient id="tank" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffd84d"/>
      <stop offset="1" stop-color="#f5c518"/>
    </linearGradient>
  </defs>
  <!-- tło -->
  <rect width="120" height="120" rx="22" fill="#143a4a"/>
  <circle cx="60" cy="54" r="44" fill="#0e2c39"/>

  <!-- płyta winylowa -->
  <circle cx="86" cy="78" r="20" fill="#111"/>
  <circle cx="86" cy="78" r="13" fill="none" stroke="#2a2a2a" stroke-width="2"/>
  <circle cx="86" cy="78" r="6" fill="#e8731c"/>
  <circle cx="86" cy="78" r="1.6" fill="#0e2c39"/>

  <!-- beczkowóz / cysterna -->
  <g>
    <!-- koła -->
    <circle cx="34" cy="84" r="8" fill="#1b1b1b"/>
    <circle cx="34" cy="84" r="3.4" fill="#6d8893"/>
    <circle cx="56" cy="84" r="8" fill="#1b1b1b"/>
    <circle cx="56" cy="84" r="3.4" fill="#6d8893"/>
    <!-- zbiornik -->
    <rect x="20" y="52" width="52" height="26" rx="13" fill="url(#tank)" stroke="#cf5f10" stroke-width="2"/>
    <ellipse cx="24" cy="65" rx="4" ry="11" fill="#e8731c" opacity=".55"/>
    <!-- twarz -->
    <circle cx="46" cy="63" r="2.4" fill="#143a4a"/>
    <circle cx="56" cy="63" r="2.4" fill="#143a4a"/>
    <path d="M44 69 q6 6 14 0" fill="none" stroke="#143a4a" stroke-width="2.4" stroke-linecap="round"/>
  </g>

  <!-- słuchawki -->
  <path d="M30 50 a21 21 0 0 1 42 0" fill="none" stroke="#0e2c39" stroke-width="4" stroke-linecap="round"/>
  <rect x="26" y="48" width="9" height="14" rx="4" fill="#e8731c"/>
  <rect x="67" y="48" width="9" height="14" rx="4" fill="#e8731c"/>
</svg>
